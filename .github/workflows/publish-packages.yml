# Publish Packages — publishes @recallnet/* packages to npmjs via trusted
# publishing and mirrors them to GitHub Packages. This workflow must be the
# direct publishing workflow configured in npmjs, so it runs on pushes to main
# instead of chaining off another workflow.

name: Publish Packages

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    # Trusted publishing binds npm packages to this exact workflow file.
    # Skip the follow-up push generated by `changeset version` to avoid loops.
    if: >-
      github.repository == 'recallnet/codecontext' &&
      !contains(github.event.head_commit.message, 'chore: version packages [skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        run: |
          output=$(pnpm changeset status 2>&1) && rc=0 || rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found pending changesets"
          elif echo "$output" | grep -qi "no.*changesets"; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets"
          else
            echo "::error::changeset status failed unexpectedly:"
            echo "$output"
            exit 1
          fi

      - name: Build packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm build

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm changeset version

      - name: Commit and push version changes
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages [skip ci]" || echo "No changes to commit"
          git push

      - name: Publish packages
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm changeset publish

      - name: Configure GitHub Packages auth
        if: steps.changesets.outputs.has_changesets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@recallnet"

      - name: Publish packages to GitHub Packages
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"
        run: pnpm changeset publish --registry=https://npm.pkg.github.com

      - name: Collect published package releases
        if: steps.changesets.outputs.has_changesets == 'true'
        id: releases
        run: |
          # @context decision: GitHub Releases are package-scoped rather than
          # repo-scoped because a single Changesets run can publish multiple npm
          # packages. Collapsing that into one repo release would hide which
          # package/version pairs actually shipped.
          node <<'EOF'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');

          const outputPath = process.env.RUNNER_TEMP + '/published-releases.json';
          const diff = execFileSync(
            'git',
            ['diff', '--name-only', 'HEAD^', 'HEAD', '--', 'packages/*/package.json'],
            { encoding: 'utf8' },
          )
            .trim()
            .split('\n')
            .filter(Boolean);

          const releases = [];
          for (const file of diff) {
            const before = JSON.parse(execFileSync('git', ['show', `HEAD^:${file}`], { encoding: 'utf8' }));
            const after = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (!after.name || after.private || before.version === after.version) {
              continue;
            }

            const shortName = after.name.replace(/^@[^/]+\//, '');
            releases.push({
              packageName: after.name,
              version: after.version,
              tag: `${shortName}-v${after.version}`,
              npmUrl: `https://www.npmjs.com/package/${after.name}/v/${after.version}`,
            });
          }

          fs.writeFileSync(outputPath, JSON.stringify(releases, null, 2) + '\n');
          process.stdout.write(`release_count=${releases.length}\n`);
          process.stdout.write(`release_manifest=${outputPath}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `release_count=${releases.length}\nrelease_manifest=${outputPath}\n`);
          EOF

      - name: Create GitHub Releases
        if: >-
          steps.changesets.outputs.has_changesets == 'true' &&
          steps.releases.outputs.release_count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_MANIFEST: ${{ steps.releases.outputs.release_manifest }}
        run: |
          node <<'EOF' > "$RUNNER_TEMP/release-lines.tsv"
          const fs = require('node:fs');

          const releases = JSON.parse(fs.readFileSync(process.env.RELEASE_MANIFEST, 'utf8'));
          for (const release of releases) {
            const body = [
              `${release.packageName} ${release.version} was published to npmjs from this workflow run.`,
              '',
              `npm: ${release.npmUrl}`,
            ].join('\n');
            process.stdout.write([
              release.tag,
              release.packageName,
              release.version,
              Buffer.from(body, 'utf8').toString('base64'),
            ].join('\t') + '\n');
          }
          EOF

          while IFS=$'\t' read -r tag package_name version body_b64; do
            [ -n "$tag" ] || continue
            body=$(printf '%s' "$body_b64" | base64 --decode)
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release edit "$tag" \
                --title "$package_name@$version" \
                --notes "$body"
            else
              gh release create "$tag" \
                --target HEAD \
                --title "$package_name@$version" \
                --notes "$body"
            fi
          done < "$RUNNER_TEMP/release-lines.tsv"
